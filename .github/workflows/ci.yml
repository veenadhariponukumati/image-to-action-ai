name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: image_to_action_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgres://postgres:testpassword@localhost:5432/image_to_action_test
      # CI-only dummy secret — never the real local/production JWT_SECRET.
      JWT_SECRET: ci-only-dummy-secret-do-not-use-in-production-073a179bf7334ad2

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations
        run: npx drizzle-kit migrate

      - name: Typecheck
        run: pnpm run check

      - name: Test
        run: pnpm test
